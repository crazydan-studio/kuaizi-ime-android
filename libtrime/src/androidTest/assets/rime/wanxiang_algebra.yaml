# 万象拼音转写
# - 对于字典中带声调的拼音，需要将声调字母转写为普通字母，转写后才能做全拼查询
# - 对于双拼输入方案，需要将无声调拼音转写为对应的双拼，转写后才能做双拼查询

base:
  全拼:
    __append:
      - xform/Ⅰ//  #用于Lua判断输入类型的标记
      - xform/^([a-z]+)$/$1④/
      - xform/^(.*)ā(.*)$/$1a$2①/
      - xform/^(.*)á(.*)$/$1a$2②/
      - xform/^(.*)ǎ(.*)$/$1a$2③/
      - xform/^(.*)à(.*)$/$1a$2④/
      - xform/^(.*)ō(.*)$/$1o$2①/
      - xform/^(.*)ó(.*)$/$1o$2②/
      - xform/^(.*)ǒ(.*)$/$1o$2③/
      - xform/^(.*)ò(.*)$/$1o$2④/
      - xform/^(.*)ē(.*)$/$1e$2①/
      - xform/^(.*)é(.*)$/$1e$2②/
      - xform/^(.*)ě(.*)$/$1e$2③/
      - xform/^(.*)è(.*)$/$1e$2④/
      - xform/^(.*)ī(.*)$/$1i$2①/
      - xform/^(.*)í(.*)$/$1i$2②/
      - xform/^(.*)ǐ(.*)$/$1i$2③/
      - xform/^(.*)ì(.*)$/$1i$2④/
      - xform/^(.*)ū(.*)$/$1u$2①/
      - xform/^(.*)ú(.*)$/$1u$2②/
      - xform/^(.*)ǔ(.*)$/$1u$2③/
      - xform/^(.*)ù(.*)$/$1u$2④/
      - xform/^(.*)ǖ(.*)$/$1v$2①/
      - xform/^(.*)ǘ(.*)$/$1v$2②/
      - xform/^(.*)ǚ(.*)$/$1v$2③/
      - xform/^(.*)ǜ(.*)$/$1v$2④/
      - xform/^(.*)ü(.*)$/$1v$2/
      - xform/^(.*)ń(.*)$/$1n$2②/
      - xform/^(.*)ň(.*)$/$1n$2③/
      - xform/^(.*)ǹ(.*)$/$1n$2④/
      - xform/^(.*)ḿ(.*)(;.*)$/$1m$2②$3/
      - xform/^(.*)m̀(.*)(;.*)$/$1m$2④$3/
      - xlit/①②③④/7890
